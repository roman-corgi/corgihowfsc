# Calibration data used to generate HLC FPM representations
# for the HOWFS/C model.

# rotDeg : float
#     Counterclockwise rotation of the occulter compared to the reference file.
#     Units of Degrees.
rotDeg: 270  # Checked by A.J. using D-104433 PPPCS RevC and HLC12 Design PowerPoint.

# ppl : float
#     Resolution at which to generate the FPM.
#     Units of pixels per lambda_central/D.
ppl: 12.0

# aoi : float
#     Angle of incidence of the beam at the focal plane masks.
#     Units of Degrees.
aoi: 5.5
